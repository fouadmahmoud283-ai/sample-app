<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sphinxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BC9A6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="desertGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Desert background -->
  <rect width="400" height="300" fill="url(#desertGradient)"/>
  
  <!-- Sphinx body (lion body) -->
  <ellipse cx="200" cy="220" rx="120" ry="40" fill="url(#sphinxGradient)"/>
  
  <!-- Sphinx chest/front -->
  <ellipse cx="140" cy="200" rx="60" ry="50" fill="url(#sphinxGradient)"/>
  
  <!-- Sphinx head -->
  <ellipse cx="120" cy="160" rx="45" ry="55" fill="url(#sphinxGradient)"/>
  
  <!-- Headdress (Nemes) -->
  <path d="M 75 130 Q 120 110 165 130 L 165 180 Q 120 170 75 180 Z" fill="#4169E1" stroke="#191970" stroke-width="2"/>
  
  <!-- Headdress stripes -->
  <g stroke="#FFD700" stroke-width="2" fill="none">
    <path d="M 85 140 Q 120 125 155 140"/>
    <path d="M 90 150 Q 120 135 150 150"/>
    <path d="M 95 160 Q 120 145 145 160"/>
  </g>
  
  <!-- Face features -->
  <!-- Eyes -->
  <ellipse cx="105" cy="150" rx="8" ry="6" fill="#000"/>
  <ellipse cx="135" cy="150" rx="8" ry="6" fill="#000"/>
  <ellipse cx="105" cy="148" rx="3" ry="2" fill="#FFF"/>
  <ellipse cx="135" cy="148" rx="3" ry="2" fill="#FFF"/>
  
  <!-- Nose -->
  <path d="M 120 155 L 115 165 L 125 165 Z" fill="#BC9A6A"/>
  
  <!-- Mouth -->
  <path d="M 110 175 Q 120 180 130 175" stroke="#8B4513" stroke-width="2" fill="none"/>
  
  <!-- Paws -->
  <ellipse cx="80" cy="240" rx="25" ry="15" fill="url(#sphinxGradient)"/>
  <ellipse cx="130" cy="240" rx="25" ry="15" fill="url(#sphinxGradient)"/>
  
  <!-- Shadow -->
  <ellipse cx="220" cy="260" rx="140" ry="20" fill="#000" opacity="0.2"/>
  
  <!-- Pyramid in background -->
  <polygon points="320,100 380,200 260,200" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Desert dunes -->
  <path d="M 0 250 Q 100 240 200 250 Q 300 240 400 250 L 400 300 L 0 300 Z" fill="#F4A460" opacity="0.7"/>
</svg>
