<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="obeliskGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2B48C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="220" fill="url(#skyGradient)"/>
  
  <!-- Desert ground -->
  <rect y="220" width="400" height="80" fill="#DEB887"/>
  
  <!-- Obelisk base -->
  <rect x="170" y="200" width="60" height="20" fill="#8B7355"/>
  
  <!-- Obelisk main body -->
  <rect x="185" y="60" width="30" height="140" fill="url(#obeliskGradient)"/>
  
  <!-- Obelisk pyramidion (top) -->
  <polygon points="200,40 185,60 215,60" fill="#D4AF37"/>
  
  <!-- Hieroglyphic inscriptions on obelisk -->
  <g fill="#8B4513" opacity="0.7">
    <!-- Column 1 -->
    <rect x="190" y="70" width="2" height="6"/>
    <circle cx="193" cy="73" r="1.5"/>
    <rect x="190" y="80" width="6" height="2"/>
    <path d="M 190 90 L 192 96 L 194 90" fill="none" stroke="#8B4513" stroke-width="1"/>
    
    <!-- Column 2 -->
    <rect x="190" y="110" width="2" height="6"/>
    <circle cx="193" cy="113" r="1.5"/>
    <rect x="190" y="120" width="6" height="2"/>
    <path d="M 190 130 L 192 136 L 194 130" fill="none" stroke="#8B4513" stroke-width="1"/>
    
    <!-- Column 3 -->
    <rect x="190" y="150" width="2" height="6"/>
    <circle cx="193" cy="153" r="1.5"/>
    <rect x="190" y="160" width="6" height="2"/>
    <path d="M 190 170 L 192 176 L 194 170" fill="none" stroke="#8B4513" stroke-width="1"/>
    
    <!-- Right side hieroglyphs -->
    <rect x="204" y="70" width="2" height="6"/>
    <circle cx="207" cy="73" r="1.5"/>
    <rect x="204" y="80" width="6" height="2"/>
    
    <rect x="204" y="110" width="2" height="6"/>
    <circle cx="207" cy="113" r="1.5"/>
    <rect x="204" y="120" width="6" height="2"/>
    
    <rect x="204" y="150" width="2" height="6"/>
    <circle cx="207" cy="153" r="1.5"/>
    <rect x="204" y="160" width="6" height="2"/>
  </g>
  
  <!-- Obelisk shadow -->
  <polygon points="215,60 280,220 230,220 185,60" fill="#000" opacity="0.2"/>
  
  <!-- Sun -->
  <circle cx="350" cy="60" r="25" fill="#FFD700"/>
  
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="350" y1="25" x2="350" y2="15"/>
    <line x1="350" y1="105" x2="350" y2="115"/>
    <line x1="315" y1="60" x2="305" y2="60"/>
    <line x1="385" y1="60" x2="395" y2="60"/>
    <line x1="328" y1="43" x2="321" y2="36"/>
    <line x1="372" y1="77" x2="379" y2="84"/>
    <line x1="328" y1="77" x2="321" y2="84"/>
    <line x1="372" y1="43" x2="379" y2="36"/>
  </g>
  
  <!-- Palm trees in background -->
  <g opacity="0.6">
    <!-- Left palm tree -->
    <rect x="50" y="180" width="6" height="40" fill="#8B4513"/>
    <ellipse cx="53" cy="175" rx="12" ry="6" fill="#228B22"/>
    <ellipse cx="53" cy="170" rx="10" ry="5" fill="#32CD32"/>
    
    <!-- Right palm tree -->
    <rect x="320" y="190" width="6" height="30" fill="#8B4513"/>
    <ellipse cx="323" cy="185" rx="10" ry="5" fill="#228B22"/>
    <ellipse cx="323" cy="180" rx="8" ry="4" fill="#32CD32"/>
  </g>
  
  <!-- Desert dunes -->
  <path d="M 0 240 Q 100 230 200 240 Q 300 230 400 240 L 400 300 L 0 300 Z" fill="#F4A460" opacity="0.7"/>
</svg>
