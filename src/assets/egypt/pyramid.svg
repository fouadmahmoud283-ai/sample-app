<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pyramidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="200" fill="url(#skyGradient)"/>
  
  <!-- Desert ground -->
  <rect y="200" width="400" height="100" fill="#DEB887"/>
  
  <!-- Main pyramid -->
  <polygon points="200,50 320,200 80,200" fill="url(#pyramidGradient)" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Pyramid shadow side -->
  <polygon points="200,50 320,200 260,200 200,120" fill="#8B7355" opacity="0.8"/>
  
  <!-- Small pyramid in background -->
  <polygon points="320,120 380,200 260,200" fill="#CD853F" opacity="0.7"/>
  
  <!-- Sun -->
  <circle cx="350" cy="70" r="25" fill="#FFD700"/>
  
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="350" y1="35" x2="350" y2="25"/>
    <line x1="350" y1="115" x2="350" y2="125"/>
    <line x1="315" y1="70" x2="305" y2="70"/>
    <line x1="385" y1="70" x2="395" y2="70"/>
    <line x1="328" y1="53" x2="321" y2="46"/>
    <line x1="372" y1="87" x2="379" y2="94"/>
    <line x1="328" y1="87" x2="321" y2="94"/>
    <line x1="372" y1="53" x2="379" y2="46"/>
  </g>
</svg>
