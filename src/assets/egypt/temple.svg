<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="templeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BC9A6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="columnGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2B48C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="200" fill="#87CEEB"/>
  
  <!-- Desert ground -->
  <rect y="200" width="400" height="100" fill="#DEB887"/>
  
  <!-- Temple base/platform -->
  <rect x="50" y="180" width="300" height="20" fill="#8B7355"/>
  
  <!-- Temple main structure -->
  <rect x="80" y="120" width="240" height="60" fill="url(#templeGradient)"/>
  
  <!-- Temple roof -->
  <polygon points="70,120 200,80 330,120" fill="#B8860B"/>
  
  <!-- Columns -->
  <rect x="100" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="130" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="160" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="190" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="220" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="250" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  <rect x="280" y="140" width="15" height="40" fill="url(#columnGradient)"/>
  
  <!-- Column capitals -->
  <rect x="95" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="125" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="155" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="185" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="215" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="245" y="135" width="25" height="8" fill="#D4AF37"/>
  <rect x="275" y="135" width="25" height="8" fill="#D4AF37"/>
  
  <!-- Temple entrance -->
  <rect x="180" y="150" width="40" height="30" fill="#654321"/>
  
  <!-- Hieroglyphic decorations on walls -->
  <g fill="#8B4513" opacity="0.6">
    <!-- Left wall hieroglyphs -->
    <rect x="85" y="125" width="3" height="8"/>
    <circle cx="92" cy="129" r="2"/>
    <rect x="85" y="135" width="8" height="3"/>
    
    <!-- Right wall hieroglyphs -->
    <rect x="312" y="125" width="3" height="8"/>
    <circle cx="305" cy="129" r="2"/>
    <rect x="307" y="135" width="8" height="3"/>
  </g>
  
  <!-- Temple steps -->
  <rect x="70" y="180" width="260" height="5" fill="#A0522D"/>
  <rect x="80" y="185" width="240" height="5" fill="#A0522D"/>
  <rect x="90" y="190" width="220" height="5" fill="#A0522D"/>
  
  <!-- Palm trees -->
  <g>
    <!-- Left palm tree -->
    <rect x="25" y="160" width="8" height="40" fill="#8B4513"/>
    <ellipse cx="29" cy="155" rx="15" ry="8" fill="#228B22"/>
    <ellipse cx="29" cy="150" rx="12" ry="6" fill="#32CD32"/>
    
    <!-- Right palm tree -->
    <rect x="367" y="160" width="8" height="40" fill="#8B4513"/>
    <ellipse cx="371" cy="155" rx="15" ry="8" fill="#228B22"/>
    <ellipse cx="371" cy="150" rx="12" ry="6" fill="#32CD32"/>
  </g>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="20" fill="#FFD700"/>
</svg>
